services:
  web:
    image: ${DOCKER_IMAGE:-dukerupert/a-team-gutters:dev-latest}
    ports:
      - "${LISTEN_PORT:-3000}:80"
    environment:
      - POSTMARK_SERVER_TOKEN=${POSTMARK_SERVER_TOKEN:-}
      - POSTMARK_FROM=${POSTMARK_FROM:-}
      - POSTMARK_TO=${POSTMARK_TO:-}
    restart: unless-stopped
