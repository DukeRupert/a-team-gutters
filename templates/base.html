</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    {{template "nav" .}}

    <main id="main-content">
        {{block "content" .}}{{end}}
    </main>

    {{template "footer" .}}

    <!-- Plausible goal tracking -->
    <script>
        // Track phone call clicks
        document.addEventListener('click', function(e) {
            var link = e.target.closest('a[href^="tel:"]');
            if (link && window.plausible) {
                plausible('Phone Call');
            }
        });

        // Track successful form submissions (HTMX swap means server accepted it)
        document.addEventListener('htmx:afterSwap', function(e) {
            if (e.detail.target.id === 'contact-form-wrap' && e.detail.xhr.status === 200 && window.plausible) {
                plausible('Form Submission');
            }
        });
    </script>
</body>
</html>
